stages:
  - build
  - deploy

build:
  stage: build
  image: docker:24-dind
  tags:
    - jy-testing
  services:
    - docker:24-dind
  script:
    - docker builder prune -f || true
    - docker compose -f docker-compose.yml build app
    - echo "Build complete — skipping registry push (no CI_REGISTRY credentials set)"
  variables:
    DOCKER_DRIVER: overlay2
  only:
    - master

deploy:
  stage: deploy
  tags:
    - jy-testing
  script:
    - cd /home/uvr/.openclaw/workspace-coding_agent/projects/multi_display_artworks
    - docker compose pull
    - docker compose up -d --build
  environment:
    name: production
    url: http://localhost:5000
  only:
    - master