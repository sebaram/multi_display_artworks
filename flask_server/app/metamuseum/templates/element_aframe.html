<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/mrturck/aframe-joystick/master/joystick.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
    <script src="{{url_for('static', filename='js/drag-component.js')}}"></script>
  </head>

  <body>
    <a-scene joystick xr-mode-ui="enabled: false">
      {% if avatar == 'shiba' %}
      <a-assets>
          <a-asset-item id="avatarModel" src="{{url_for('static', filename='gltf/shiba/scene.gltf')}}"></a-asset-item>
      </a-assets>
      {% endif %}
      <a-camera id="camera"></a-camera>
      {{ aframe|safe }}
    </a-scene>

    <script>
      const avatarType = "{{ avatar }}";

      // Enable drag if element has data attributes
      document.querySelector('a-scene').addEventListener('loaded', () => {
        setTimeout(() => {
          const element = document.querySelector('[data-element-id]');
          if (element) {
            const elementId = element.getAttribute('data-element-id');
            const elementType = element.getAttribute('data-element-type');
            if (elementId && elementType) {
              element.setAttribute('drag-element', `elementId: ${elementId}, elementType: ${elementType}`);
              element.setAttribute('class', 'clickable');
            }
          }
        }, 1000);
      });
    </script>
  </body>
</html>
