<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GestureMark — Input Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Top bar ─── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .top-bar h1 { font-size: 16px; font-weight: 600; }
    .top-bar .status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: #0f3460;
    }
    .status.connected { background: #1a8a3f; }

    /* ─── Main layout ─── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Target panel (left) ─── */
    .target-panel {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .target-panel h2 {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
    }

    .target-card {
      position: relative;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 90px;
    }
    .target-card:hover { border-color: #533483; transform: scale(1.03); }
    .target-card.selected {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.15);
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
    }
    .target-card.highlight-step {
      border-color: #f5c542;
      animation: pulse-border 0.8s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 5px rgba(245, 197, 66, 0.3); }
      50% { box-shadow: 0 0 20px rgba(245, 197, 66, 0.7); }
    }

    .target-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 4px;
    }
    .target-label {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }
    .target-steps {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }
    .target-step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }
    .target-step-dot.done { background: #1a8a3f; }
    .target-step-dot.current { background: #f5c542; }

    /* ─── Watch panel (right) ─── */
    .watch-panel {
      width: 320px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-left: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .watch-panel h2 {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      align-self: flex-start;
    }

    /* ─── Watch face ─── */
    .watch-face {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: #0d1117;
      overflow: hidden;
      /* Watch bezel */
      box-shadow:
        inset 0 0 0 4px #2a2a4a,
        0 0 0 3px #1a1a3e,
        0 0 30px rgba(0, 0, 0, 0.5);
    }

    /* Rotated dashed border like the original */
    .watch-bezel {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .touchpoint-area {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      /* Subtle grid for reference */
      background:
        radial-gradient(circle, transparent 30%, rgba(15, 52, 96, 0.2) 100%);
    }

    /* Touchpoint overlay canvas */
    .touchpoint-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ─── Gesture info ─── */
    .gesture-info {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: #16213e;
      border-radius: 8px;
      text-align: center;
    }
    .gesture-info .label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .gesture-info .result {
      font-size: 18px;
      font-weight: 700;
      color: #e94560;
    }

    /* ─── Gesture assignment ─── */
    .gesture-assign {
      margin-top: 12px;
      width: 100%;
    }
    .gesture-assign h3 {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .gesture-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .gesture-dir-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 2px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 10px;
      color: #aaa;
    }
    .gesture-dir-btn:hover { border-color: #533483; }
    .gesture-dir-btn.active {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.15);
      color: #fff;
    }
    .gesture-dir-btn img {
      width: 28px;
      height: 28px;
      margin-bottom: 2px;
    }

    /* ─── Simulate button ─── */
    .sim-controls {
      margin-top: 10px;
      width: 100%;
      display: flex;
      gap: 6px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #d63851; }
    .btn-secondary { background: #0f3460; color: #ccc; }
    .btn-secondary:hover { background: #1a4a8a; }
    .btn-sm { padding: 5px 8px; font-size: 11px; }

    /* ─── Log panel ─── */
    .log-panel {
      margin-top: 10px;
      width: 100%;
      max-height: 120px;
      overflow-y: auto;
      background: #0d1117;
      border-radius: 6px;
      padding: 6px;
      font-family: monospace;
      font-size: 10px;
      color: #6a6;
    }

    /* ─── Mobile responsive ─── */
    @media (max-width: 700px) {
      .main-layout { flex-direction: column; }
      .watch-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid #0f3460;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        padding: 8px;
      }
      .watch-face { width: 200px; height: 200px; }
      .gesture-info, .gesture-assign, .log-panel, .sim-controls { width: auto; flex: 1; min-width: 200px; }
      .target-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>⚡ GestureMark Input Test</h1>
  <span class="status" id="connStatus">Connecting…</span>
</div>

<div class="main-layout">
  <!-- Left: Target selection -->
  <div class="target-panel">
    <h2>Targets ({{ num_targets }})</h2>
    <div class="target-grid" id="targetGrid">
      <!-- Filled by JS -->
    </div>
    <div style="margin-top:8px; display:flex; gap:6px;">
      <button class="btn btn-secondary btn-sm" onclick="resetSelection()">Reset</button>
      <button class="btn btn-secondary btn-sm" onclick="shuffleTargets()">Shuffle</button>
    </div>
  </div>

  <!-- Right: Watch display + gesture controls -->
  <div class="watch-panel">
    <h2>Touchpoint Stream</h2>

    <!-- Watch face with bezel -->
    <div class="watch-face" id="watchFace">
      <!-- SVG bezel (rotated dashed circle like original gesture_mark) -->
      <svg class="watch-bezel" viewBox="0 0 280 280">
        <defs>
          <filter id="bezelShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
            <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
            <feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g transform="rotate(45 140 140)">
          <circle cx="140" cy="140" r="132" fill="none" stroke="#2a2a4a" stroke-width="4"
                  stroke-dasharray="92.5 7" stroke-dashoffset="-3.5" filter="url(#bezelShadow)"/>
        </g>
        <!-- Compass markers -->
        <text x="140" y="18" text-anchor="middle" fill="#555" font-size="10">N</text>
        <text x="265" y="144" text-anchor="middle" fill="#555" font-size="10">E</text>
        <text x="140" y="272" text-anchor="middle" fill="#555" font-size="10">S</text>
        <text x="15" y="144" text-anchor="middle" fill="#555" font-size="10">W</text>
      </svg>

      <!-- Touchpoint drawing area -->
      <div class="touchpoint-area" id="touchpointArea">
        <canvas class="touchpoint-canvas" id="touchCanvas"></canvas>
      </div>
    </div>

    <!-- Gesture result -->
    <div class="gesture-info">
      <div class="label">Recognized Gesture</div>
      <div class="result" id="gestureResult">—</div>
    </div>

    <!-- Gesture direction assignment -->
    <div class="gesture-assign">
      <h3>Direction Strokes</h3>
      <div class="gesture-grid" id="gestureGrid">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Simulate controls -->
    <div class="sim-controls">
      <button class="btn btn-primary btn-sm" onclick="simulateGesture()">Simulate Random</button>
      <button class="btn btn-secondary btn-sm" onclick="clearTouchpoints()">Clear</button>
    </div>

    <!-- Log -->
    <div class="log-panel" id="logPanel"></div>
  </div>
</div>

<script>
// Injected from Flask template
const staticPath = "{{ url_for('static', filename='') }}".replace(/\/$/, '');
const socketIoUrl = "https://cdn.socket.io/4.7.5/socket.io.min.js";
</script>
<script src="{{ url_for('static', filename='js/gesture_mark_test.js') }}"></script>
</body>
</html>
