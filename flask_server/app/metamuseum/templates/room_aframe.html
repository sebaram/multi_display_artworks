<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/mrturck/aframe-joystick/master/joystick.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
    <script src="{{url_for('static', filename='js/drag-component.js')}}"></script>

  </head>
  <body>
    <a-scene joystick xr-mode-ui="enabled: false" cursor="rayOrigin: mouse">
      <a-assets>
          <a-asset-item id="avatarModel" src="{{url_for('static', filename='gltf/shiba/scene.gltf')}}"></a-asset-item>
      </a-assets>
      <a-camera id="camera"></a-camera>

      {% for one_ele in aframe_list %}
        {{ one_ele|safe }}
      {% endfor %}

    </a-scene>

    <script>
      const myUserId = Math.random().toString(36).substring(7);
      const avatarType = "{{ avatar }}";
      let handTrackingEnabled = false;
      let xrSession = null;

      // Enable drag on all draggable elements (admin only)
      function enableDrag() {
        if (!{{ 'true' if drag_enabled else 'false' }}) return;
        document.querySelectorAll('[data-element-id]').forEach(el => {
          const elementId = el.getAttribute('data-element-id');
          const elementType = el.getAttribute('data-element-type');
          if (elementId && elementType) {
            el.setAttribute('drag-element', `elementId: ${elementId}, elementType: ${elementType}`);
            el.setAttribute('class', 'clickable');
          }
        });
        // Show admin indicator
        if (!document.getElementById('admin-indicator')) {
          const indicator = document.createElement('div');
          indicator.id = 'admin-indicator';
          indicator.textContent = '✋ Drag Mode (Admin)';
          indicator.style.cssText = 'position:fixed;top:10px;right:10px;background:rgba(76,175,80,0.9);color:white;padding:6px 12px;border-radius:4px;font-size:12px;z-index:9999;';
          document.body.appendChild(indicator);
        }
      }

      // Check WebXR hand tracking support
      async function checkHandTrackingSupport() {
        if (!navigator.xr) return false;
        try {
          const supported = await navigator.xr.isSessionSupported('immersive-vr');
          return supported;
        } catch(e) {
          return false;
        }
      }

      async function enableHandTracking() {
        if (!navigator.xr) return false;
        try {
          xrSession = await navigator.xr.requestSession('immersive-vr', {
            optionalFeatures: ['hand-tracking', 'local-floor']
          });
          
          xrSession.addEventListener('end', () => {
            handTrackingEnabled = false;
            document.getElementById('hand-tracking-btn').style.background = '#666';
          });

          const handSources = await xrSession.requestHandSources();
          setupHandTracking(handSources);
          handTrackingEnabled = true;
          document.getElementById('hand-tracking-btn').style.background = '#4CAF50';
          return true;
        } catch(e) {
          console.error('Hand tracking error:', e);
          return false;
        }
      }

      function setupHandTracking(handSources) {
        let lastSendTime = 0;
        const sendInterval = 100;

        function trackHands() {
          if (!handTrackingEnabled || !xrSession) return;
          
          const now = Date.now();
          if (now - lastSendTime < sendInterval) {
            requestAnimationFrame(trackHands);
            return;
          }
          lastSendTime = now;

          let leftHandData = null;
          let rightHandData = null;

          handSources.forEach(source => {
            if (source.hand && source.handedness !== 'none') {
              const hand = source.hand;
              const isLeft = source.handedness === 'left';
              
              const getJoint = (name) => {
                const joint = hand.get(name);
                return joint ? {
                  position: [joint.position.x, joint.position.y, joint.position.z],
                  rotation: [joint.rotation.x, joint.rotation.y, joint.rotation.z]
                } : null;
              };

              const handData = {
                wrist: getJoint('wrist'),
                thumbTip: getJoint('thumb-tip'),
                indexTip: getJoint('index-tip'),
                middleTip: getJoint('middle-tip')
              };

              if (isLeft) leftHandData = handData;
              else rightHandData = handData;
            }
          });

          sendCameraData(leftHandData, rightHandData);
          requestAnimationFrame(trackHands);
        }
        trackHands();
      }

      function createAvatarEntity(avatarType) {
        if (avatarType === 'none') return null;

        if (avatarType === 'robot') {
          let wrapper = document.createElement('a-entity');
          wrapper.setAttribute('position', '0 -1 0');
          wrapper.setAttribute('rotation', '0 180 0');

          let body = document.createElement('a-box');
          body.setAttribute('color', '#4a9eff');
          body.setAttribute('width', '0.4');
          body.setAttribute('height', '0.6');
          body.setAttribute('depth', '0.2');
          body.setAttribute('position', '0 0 0');
          wrapper.appendChild(body);

          let head = document.createElement('a-sphere');
          head.setAttribute('color', '#4a9eff');
          head.setAttribute('radius', '0.15');
          head.setAttribute('position', '0 0.45 0');
          wrapper.appendChild(head);

          let leftEye = document.createElement('a-sphere');
          leftEye.setAttribute('color', '#ffffff');
          leftEye.setAttribute('radius', '0.04');
          leftEye.setAttribute('position', '-0.06 0.48 -0.12');
          wrapper.appendChild(leftEye);

          let rightEye = document.createElement('a-sphere');
          rightEye.setAttribute('color', '#ffffff');
          rightEye.setAttribute('radius', '0.04');
          rightEye.setAttribute('position', '0.06 0.48 -0.12');
          wrapper.appendChild(rightEye);

          let leftArm = document.createElement('a-box');
          leftArm.setAttribute('color', '#3a8adf');
          leftArm.setAttribute('width', '0.1');
          leftArm.setAttribute('height', '0.4');
          leftArm.setAttribute('depth', '0.1');
          leftArm.setAttribute('position', '-0.3 -0.1 0');
          wrapper.appendChild(leftArm);

          let rightArm = document.createElement('a-box');
          rightArm.setAttribute('color', '#3a8adf');
          rightArm.setAttribute('width', '0.1');
          rightArm.setAttribute('height', '0.4');
          rightArm.setAttribute('depth', '0.1');
          rightArm.setAttribute('position', '0.3 -0.1 0');
          wrapper.appendChild(rightArm);

          let leftLeg = document.createElement('a-box');
          leftLeg.setAttribute('color', '#3a8adf');
          leftLeg.setAttribute('width', '0.12');
          leftLeg.setAttribute('height', '0.4');
          leftLeg.setAttribute('depth', '0.12');
          leftLeg.setAttribute('position', '-0.12 -0.5 0');
          wrapper.appendChild(leftLeg);

          let rightLeg = document.createElement('a-box');
          rightLeg.setAttribute('color', '#3a8adf');
          rightLeg.setAttribute('width', '0.12');
          rightLeg.setAttribute('height', '0.4');
          rightLeg.setAttribute('depth', '0.12');
          rightLeg.setAttribute('position', '0.12 -0.5 0');
          wrapper.appendChild(rightLeg);

          return wrapper;
        }

        let avatar = document.createElement('a-entity');
        avatar.setAttribute('gltf-model', '#avatarModel');
        avatar.setAttribute('rotation', '0 180 0');
        avatar.setAttribute('position', '0 -1 0');
        avatar.setAttribute('scale', '0.5 0.5 0.5');
        return avatar;
      }

      function createHandVisualization(handData, isLeft) {
        if (!handData) return null;
        
        let hand = document.createElement('a-entity');
        hand.setAttribute('class', `hand-${isLeft ? 'left' : 'right'}`);
        
        let palm = document.createElement('a-box');
        palm.setAttribute('color', '#00ff88');
        palm.setAttribute('width', '0.08');
        palm.setAttribute('height', '0.1');
        palm.setAttribute('depth', '0.02');
        if (handData.wrist && handData.wrist.position) {
          palm.setAttribute('position', `${handData.wrist.position[0]} ${handData.wrist.position[1]} ${handData.wrist.position[2]}`);
        }
        hand.appendChild(palm);

        ['thumbTip', 'indexTip', 'middleTip'].forEach((joint, i) => {
          if (handData[joint] && handData[joint].position) {
            let finger = document.createElement('a-sphere');
            finger.setAttribute('color', '#00ff88');
            finger.setAttribute('radius', '0.02');
            finger.setAttribute('position', `${handData[joint].position[0]} ${handData[joint].position[1]} ${handData[joint].position[2]}`);
            hand.appendChild(finger);
          }
        });

        return hand;
      }

      function sendCameraData(leftHand = null, rightHand = null) {
        const cameraEl = document.getElementById('camera');
        const position = cameraEl.getAttribute('position');
        const rotation = cameraEl.getAttribute('rotation');

        fetch("{{url_for('main.receive_camera_data')}}", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            position, 
            rotation, 
            userId: myUserId, 
            avatar: avatarType,
            leftHand,
            rightHand,
            handTrackingEnabled: { enabled: handTrackingEnabled, device: 'webxr' }
          }),
        }).catch(err => console.error('Camera data error:', err));
      }

      setInterval(() => {
        if (!handTrackingEnabled) {
          const cameraEl = document.getElementById('camera');
          const position = cameraEl.getAttribute('position');
          const rotation = cameraEl.getAttribute('rotation');
          sendCameraData();
        }
      }, 200);

      function updateOtherUsersCameras(data) {
        let cameraIdList = [];
        let handIdList = [];
        
        document.querySelectorAll('a-entity[id^="camera-"]').forEach(el => {
          cameraIdList.push(el.id);
        });
        document.querySelectorAll('a-entity[class^="hand-"]').forEach(el => {
          handIdList.push(el.id);
        });

        Object.keys(data).forEach(_index => {
          const userId = data[_index].userId;
          if (userId === myUserId) return;

          const otherAvatarType = data[_index].avatar || 'shiba';

          let cameraEl = document.getElementById(`camera-${userId}`);
          if (!cameraEl) {
            cameraEl = document.createElement('a-entity');
            cameraEl.setAttribute('id', `camera-${userId}`);
            cameraEl.setAttribute('rotation', '0 180 0');

            let avatar = createAvatarEntity(otherAvatarType);
            if (avatar) cameraEl.appendChild(avatar);

            let idText = document.createElement('a-text');
            idText.setAttribute('value', userId);
            idText.setAttribute('position', '0 0 0');
            idText.setAttribute('scale', '1 1 1');
            idText.setAttribute('rotation', '0 180 0');
            idText.setAttribute('color', 'red');
            idText.setAttribute('align', 'center');
            cameraEl.appendChild(idText);

            document.querySelector('a-scene').appendChild(cameraEl);
          }
          cameraEl.setAttribute('position', data[_index].position);
          cameraEl.setAttribute('rotation', data[_index].rotation);

          if (data[_index].handTrackingEnabled && data[_index].handTrackingEnabled.enabled) {
            const leftHandData = data[_index].leftHand;
            const rightHandData = data[_index].rightHand;

            ['left', 'right'].forEach((side, i) => {
              const handData = i === 0 ? leftHandData : rightHandData;
              const handId = `hand-${side}-${userId}`;
              
              let handEl = document.getElementById(handId);
              if (!handData) {
                if (handEl) { handEl.parentNode.removeChild(handEl); }
                return;
              }

              if (!handEl) {
                handEl = createHandVisualization(handData, side === 'left');
                if (handEl) {
                  handEl.setAttribute('id', handId);
                  cameraEl.appendChild(handEl);
                }
              } else {
                if (handData.wrist && handData.wrist.position) {
                  handEl.setAttribute('position', `${handData.wrist.position[0]} ${handData.wrist.position[1]} ${handData.wrist.position[2]}`);
                }
              }
              handIdList = handIdList.filter(id => id !== handId);
            });
          }

          cameraIdList = cameraIdList.filter(id => id !== `camera-${userId}`);
        });

        cameraIdList.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.parentNode.removeChild(el);
        });
        handIdList.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.parentNode.removeChild(el);
        });
      }

      setInterval(() => {
        fetch("{{url_for('main.get_cameras')}}")
          .then(response => response.json())
          .then(data => updateOtherUsersCameras(data))
          .catch(err => console.error('Get cameras error:', err));
      }, 200);

      document.addEventListener('DOMContentLoaded', async () => {
        // Enable drag after scene loads
        setTimeout(enableDrag, 1000);

        const supported = await checkHandTrackingSupport();
        if (supported) {
          const btn = document.createElement('button');
          btn.id = 'hand-tracking-btn';
          btn.textContent = '🤚 Hand Tracking';
          btn.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#666;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;z-index:9999;';
          btn.onclick = enableHandTracking;
          document.body.appendChild(btn);
        }
      });

      // Also enable drag after scene loaded
      document.querySelector('a-scene').addEventListener('loaded', () => {
        setTimeout(enableDrag, 500);
      });

    </script>
  </body>
</html>
