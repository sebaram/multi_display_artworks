<html>
  <head>
    <meta charset="utf-8">
    {% if refresh_interval %}
    <meta http-equiv="refresh" content="{{ refresh_interval }}">
    {% endif %}
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="enabled: false">
      <a-entity position="0 0 0" >
        <a-camera fov="60" camera="" position="0 0 {{camera_d}}" rotation="" look-controls="" wasd-controls="acceleration:5"></a-camera>
      </a-entity>

      {% for one_ele in aframe_list %}
        {{ one_ele|safe }}
      {% endfor %}

    </a-scene>

    {% if refresh_interval %}
    <div style="position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.7);color:white;padding:8px 12px;border-radius:4px;font-size:12px;z-index:9999;">
      🔄 Auto-refresh: {{ refresh_interval }}s
    </div>
    {% endif %}
  </body>
</html>
